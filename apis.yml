aid: sprinklr
name: Sprinklr
description: Sprinklr is a unified customer experience management (Unified-CXM) platform
  offering REST APIs for social media management, customer service, marketing, and
  advertising across 30+ digital channels. APIs support listening, publishing, reporting,
  user provisioning, digital asset management, and webhook integrations, all secured
  via OAuth 2.0 and accessible to enterprise license holders.
